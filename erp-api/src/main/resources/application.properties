spring.profiles.active=local
# Database Connection (AWS RDS)
spring.datasource.url=jdbc:postgresql://your-rds-endpoint.aws-region.rds.amazonaws.com:5432/erp_db
spring.datasource.username=admin
spring.datasource.password=your_secure_password
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate Settings
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Connection Pooling (HikariCP - Enterprise Optimization)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.connection-timeout=20000

# Caching (Standard Requirement)
spring.cache.type=caffeine
spring.cache.cache-names=employees,departments,products

# Logging (Observability Requirement)
logging.level.root=INFO
logging.level.com.erp=DEBUG
logging.file.name=logs/erp-system.log

# Security & Sessions
spring.session.store-type=none

# Expose monitoring endpoints
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.show-details=always

# Enable Liveness and Readiness probes for Kubernetes
management.endpoint.health.probes.enabled=true