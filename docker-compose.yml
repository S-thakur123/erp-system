version: '3.8'

services:
  # Local Database Service
  erp-db:
    image: postgres:14
    container_name: erp-postgres-local
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=erp_db
      - TZ=Asia/Kolkata
    ports:
      - "5432:5432"
    volumes:
      - erp_data:/var/lib/postgresql/data

  # Optional: PGAdmin to view your tables locally
  pgadmin:
    image: dpage/pgadmin4
    container_name: erp-pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@erp.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "5050:80"
    depends_on:
      - erp-db

volumes:
  erp_data: